name: CD

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: true
        default: 'main'
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to VPS (staging)
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

    steps:
      - name: Validate SSH key secret is present
        run: |
          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing secret: VPS_SSH_PRIVATE_KEY (check repo/environment secrets)."
            exit 1
          fi

      - name: Validate SSH connection secrets are present
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_PORT }}" ]; then
            echo "Missing secret: VPS_SSH_PORT"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_USER }}" ]; then
            echo "Missing secret: VPS_SSH_USER"
            exit 1
          fi

      - name: Start SSH agent
        run: |
          set -e
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.VPS_SSH_PRIVATE_KEY }}"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add VPS host key
        run: |
          set -e
          mkdir -p "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          chmod 700 "$HOME/.ssh"
          chmod 600 "$HOME/.ssh/known_hosts"
          if ! ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts"; then
            echo "Failed to fetch host key. Check VPS_HOST/VPS_SSH_PORT and network reachability."
            exit 1
          fi

      - name: Validate remote directories exist (staging)
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               test -d '${{ secrets.VPS_BACKEND_DIR_STAGING }}' || (echo 'Missing remote dir for VPS_BACKEND_DIR_STAGING' && exit 1) && \
               test -d '${{ secrets.VPS_FRONTEND_DIR_STAGING }}' || (echo 'Missing remote dir for VPS_FRONTEND_DIR_STAGING' && exit 1)"

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               git config --global --add safe.directory '${{ secrets.VPS_BACKEND_DIR_STAGING }}' && \
               git config --global --add safe.directory '${{ secrets.VPS_FRONTEND_DIR_STAGING }}' && \
               cd '${{ secrets.VPS_BACKEND_DIR_STAGING }}' && \
               git fetch origin --tags --prune && \
               (git checkout --force '${{ env.DEPLOY_REF }}' || git checkout --force 'origin/${{ env.DEPLOY_REF }}') && \
               echo 'Backend deployed commit:' && \
               git rev-parse HEAD && \
               cd '${{ secrets.VPS_FRONTEND_DIR_STAGING }}' && \
               git fetch origin --tags --prune && \
               (git checkout --force '${{ env.DEPLOY_REF }}' || git checkout --force 'origin/${{ env.DEPLOY_REF }}') && \
               echo 'Frontend deployed commit:' && \
               git rev-parse HEAD && \
               APP_INSTANCE='stg' COMPOSE_PROJECT_NAME='sinmentiras-staging' FRONTEND_BIND_IP='127.0.0.1' FRONTEND_PORT='18001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR_STAGING }}' BACKEND_ENV_FILE='${{ secrets.VPS_BACKEND_DIR_STAGING }}/.env' docker compose up -d --build && \
               docker image prune -f"

  deploy-production:
    name: Deploy to VPS (production)
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

    steps:
      - name: Validate SSH key secret is present
        run: |
          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing secret: VPS_SSH_PRIVATE_KEY (check repo/environment secrets)."
            exit 1
          fi

      - name: Validate SSH connection secrets are present
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_PORT }}" ]; then
            echo "Missing secret: VPS_SSH_PORT"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_USER }}" ]; then
            echo "Missing secret: VPS_SSH_USER"
            exit 1
          fi

      - name: Start SSH agent
        run: |
          set -e
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.VPS_SSH_PRIVATE_KEY }}"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add VPS host key
        run: |
          set -e
          mkdir -p "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          chmod 700 "$HOME/.ssh"
          chmod 600 "$HOME/.ssh/known_hosts"
          if ! ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts"; then
            echo "Failed to fetch host key. Check VPS_HOST/VPS_SSH_PORT and network reachability."
            exit 1
          fi

      - name: Validate remote directories exist (production)
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               test -d '${{ secrets.VPS_BACKEND_DIR }}' || (echo 'Missing remote dir for VPS_BACKEND_DIR' && exit 1) && \
               test -d '${{ secrets.VPS_FRONTEND_DIR }}' || (echo 'Missing remote dir for VPS_FRONTEND_DIR' && exit 1)"

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               git config --global --add safe.directory '${{ secrets.VPS_BACKEND_DIR }}' && \
               git config --global --add safe.directory '${{ secrets.VPS_FRONTEND_DIR }}' && \
               cd '${{ secrets.VPS_BACKEND_DIR }}' && \
               git fetch origin --tags --prune && \
               (git checkout --force '${{ env.DEPLOY_REF }}' || git checkout --force 'origin/${{ env.DEPLOY_REF }}') && \
               echo 'Backend deployed commit:' && \
               git rev-parse HEAD && \
               cd '${{ secrets.VPS_FRONTEND_DIR }}' && \
               git fetch origin --tags --prune && \
               (git checkout --force '${{ env.DEPLOY_REF }}' || git checkout --force 'origin/${{ env.DEPLOY_REF }}') && \
               echo 'Frontend deployed commit:' && \
               git rev-parse HEAD && \
               APP_INSTANCE='prd' COMPOSE_PROJECT_NAME='sinmentiras-production' FRONTEND_BIND_IP='0.0.0.0' FRONTEND_PORT='8001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR }}' BACKEND_ENV_FILE='${{ secrets.VPS_BACKEND_DIR }}/.env' docker compose up -d --build && \
               docker image prune -f"