name: CD

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: true
        default: 'main'
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               cd '${{ secrets.VPS_BACKEND_DIR }}' && git pull origin main && \
               cd '${{ secrets.VPS_FRONTEND_DIR }}' && git pull origin main && \
               BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR }}' docker compose up -d --build && \
               docker image prune -f"