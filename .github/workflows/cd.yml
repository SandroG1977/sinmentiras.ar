name: CD

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, PRD]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: true
        default: 'main'
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to VPS (staging)
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               cd '${{ secrets.VPS_BACKEND_DIR_STAGING }}' && git pull origin main && \
               cd '${{ secrets.VPS_FRONTEND_DIR_STAGING }}' && git pull origin main && \
               APP_INSTANCE='stg' COMPOSE_PROJECT_NAME='sinmentiras-staging' FRONTEND_BIND_IP='127.0.0.1' FRONTEND_PORT='18001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR_STAGING }}' docker compose up -d --build && \
               docker image prune -f"

  deploy-production:
    name: Deploy to VPS (production)
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'PRD') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               cd '${{ secrets.VPS_BACKEND_DIR }}' && git pull origin PRD && \
               cd '${{ secrets.VPS_FRONTEND_DIR }}' && git pull origin PRD && \
               APP_INSTANCE='prd' COMPOSE_PROJECT_NAME='sinmentiras-production' FRONTEND_BIND_IP='0.0.0.0' FRONTEND_PORT='8001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR }}' docker compose up -d --build && \
               docker image prune -f"