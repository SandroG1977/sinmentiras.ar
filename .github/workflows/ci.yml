name: CI/CD

on:
  push:
    branches: [main, PRD]
  pull_request:
    branches: [PRD]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  deploy-staging:
    name: Deploy to VPS (staging)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_BRANCH: main

    steps:
      - name: Validate SSH key secret is present
        run: |
          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing secret: VPS_SSH_PRIVATE_KEY (check repo/environment secrets)."
            exit 1
          fi

      - name: Validate SSH connection secrets are present
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_PORT }}" ]; then
            echo "Missing secret: VPS_SSH_PORT"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_USER }}" ]; then
            echo "Missing secret: VPS_SSH_USER"
            exit 1
          fi

      - name: Start SSH agent
        run: |
          set -e
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.VPS_SSH_PRIVATE_KEY }}"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add VPS host key
        run: |
          set -e
          mkdir -p "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          chmod 700 "$HOME/.ssh"
          chmod 600 "$HOME/.ssh/known_hosts"
          if ! ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts"; then
            echo "Failed to fetch host key. Check VPS_HOST/VPS_SSH_PORT and network reachability."
            exit 1
          fi

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               git config --global --add safe.directory '${{ secrets.VPS_BACKEND_DIR_STAGING }}' && \
               git config --global --add safe.directory '${{ secrets.VPS_FRONTEND_DIR_STAGING }}' && \
               cd '${{ secrets.VPS_BACKEND_DIR_STAGING }}' && \
               git fetch origin --tags --prune '+refs/heads/*:refs/remotes/origin/*' && \
               git checkout --force 'origin/${{ env.DEPLOY_BRANCH }}' && \
               echo 'Backend deployed commit:' && \
               git rev-parse HEAD && \
               cd '${{ secrets.VPS_FRONTEND_DIR_STAGING }}' && \
               git fetch origin --tags --prune '+refs/heads/*:refs/remotes/origin/*' && \
               git checkout --force 'origin/${{ env.DEPLOY_BRANCH }}' && \
               echo 'Frontend deployed commit:' && \
               git rev-parse HEAD && \
               APP_INSTANCE='stg' COMPOSE_PROJECT_NAME='sinmentiras-staging' FRONTEND_BIND_IP='127.0.0.1' FRONTEND_PORT='18001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR_STAGING }}' BACKEND_ENV_FILE='${{ secrets.VPS_BACKEND_DIR_STAGING }}/.env' docker compose build --build-arg CACHE_BUST=$(git rev-parse HEAD) && \
               APP_INSTANCE='stg' COMPOSE_PROJECT_NAME='sinmentiras-staging' FRONTEND_BIND_IP='127.0.0.1' FRONTEND_PORT='18001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR_STAGING }}' BACKEND_ENV_FILE='${{ secrets.VPS_BACKEND_DIR_STAGING }}/.env' docker compose up -d && \
               docker image prune -f"

  deploy-production:
    name: Deploy to VPS (production)
    needs: quality
    if: >-
      (github.event_name == 'pull_request' &&
       github.base_ref == 'PRD' &&
       github.head_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/PRD')
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'PRD' }}

    steps:
      - name: Validate SSH key secret is present
        run: |
          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing secret: VPS_SSH_PRIVATE_KEY (check repo/environment secrets)."
            exit 1
          fi

      - name: Validate SSH connection secrets are present
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_PORT }}" ]; then
            echo "Missing secret: VPS_SSH_PORT"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_USER }}" ]; then
            echo "Missing secret: VPS_SSH_USER"
            exit 1
          fi

      - name: Start SSH agent
        run: |
          set -e
          eval "$(ssh-agent -s)"
          ssh-add - <<< "${{ secrets.VPS_SSH_PRIVATE_KEY }}"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add VPS host key
        run: |
          set -e
          mkdir -p "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          chmod 700 "$HOME/.ssh"
          chmod 600 "$HOME/.ssh/known_hosts"
          if ! ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts"; then
            echo "Failed to fetch host key. Check VPS_HOST/VPS_SSH_PORT and network reachability."
            exit 1
          fi

      - name: Validate remote directories exist (production)
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               test -d '${{ secrets.VPS_BACKEND_DIR }}' || (echo 'Missing remote dir for VPS_BACKEND_DIR' && exit 1) && \
               test -d '${{ secrets.VPS_FRONTEND_DIR }}' || (echo 'Missing remote dir for VPS_FRONTEND_DIR' && exit 1)"

      - name: Deploy via Docker Compose
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" \
              "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
              "set -e && \
               git config --global --add safe.directory '${{ secrets.VPS_BACKEND_DIR }}' && \
               git config --global --add safe.directory '${{ secrets.VPS_FRONTEND_DIR }}' && \
               cd '${{ secrets.VPS_BACKEND_DIR }}' && \
               git fetch origin --tags --prune '+refs/heads/*:refs/remotes/origin/*' && \
               git checkout --force 'origin/${{ env.DEPLOY_BRANCH }}' && \
               echo 'Backend deployed commit:' && \
               git rev-parse HEAD && \
               cd '${{ secrets.VPS_FRONTEND_DIR }}' && \
               git fetch origin --tags --prune '+refs/heads/*:refs/remotes/origin/*' && \
               git checkout --force 'origin/${{ env.DEPLOY_BRANCH }}' && \
               echo 'Frontend deployed commit:' && \
               git rev-parse HEAD && \
               APP_INSTANCE='prd' COMPOSE_PROJECT_NAME='sinmentiras-production' FRONTEND_BIND_IP='0.0.0.0' FRONTEND_PORT='8001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR }}' BACKEND_ENV_FILE='${{ secrets.VPS_BACKEND_DIR }}/.env' docker compose build --build-arg CACHE_BUST=$(git rev-parse HEAD) && \
               APP_INSTANCE='prd' COMPOSE_PROJECT_NAME='sinmentiras-production' FRONTEND_BIND_IP='0.0.0.0' FRONTEND_PORT='8001' BACKEND_DIR='${{ secrets.VPS_BACKEND_DIR }}' BACKEND_ENV_FILE='${{ secrets.VPS_BACKEND_DIR }}/.env' docker compose up -d && \
               docker image prune -f"
