services:
  backend:
    build:
      context: ${BACKEND_DIR:-../sinmentiras.ar backend}
      dockerfile: Dockerfile
    container_name: sinmentiras-backend
    expose:
      - "8000"
    env_file:
      - ${BACKEND_ENV_FILE:-../sinmentiras.ar backend/.env}
    environment:
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      RAG_ENABLED: ${RAG_ENABLED:-true}
    networks:
      - default
      - proxy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sinmentiras-frontend
    ports:
      - "${FRONTEND_PORT:-8001}:80"
    depends_on:
      - backend
    networks:
      - default
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-traefik_proxy}
